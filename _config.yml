title: StudyApp Docs
description: Peer-to-Peer Tutoring Marketplace — Developer Documentation
url: "https://hiyokun-d.github.io"
baseurl: "/study-app"

theme: jekyll-theme-midnight

# ── Plugins ──────────────────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag

# ── Exclude from build ───────────────────────────────────────────────────────
exclude:
  - "*.gemspec"
  - node_modules/
  - _server/node_modules/
  - _server/
  - android/
  - lib/
  - web/
  - pubspec.yaml
  - pubspec.lock
  - analysis_options.yaml
  - code_ignore
